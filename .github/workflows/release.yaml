name: Release
on:
  push:
    branches:
      - master
      - next
      - alpha
      - next-major
      - beta
      - '*.x'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm install -g semantic-release @semantic-release/github @semantic-release/npm @semantic-release/exec
      - name: Run semantic-release
        id: release
        run: semantic-release
        env:
          HUSKY: 0
          NPM_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: tauri-${{ matrix.artifact }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact: mac-arm64
          - platform: ubuntu-latest
            rust-targets: ''
            args: ''
            artifact: ubuntu
          - platform: windows-latest
            rust-targets: ''
            args: ''
            artifact: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm install --legacy-peer-deps
      - name: Set version (Unix)
        if: matrix.platform != 'windows-latest'
        run: npm --no-git-tag-version version $VERSION
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Set version (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm --no-git-tag-version version $env:VERSION
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.semantic-release.outputs.tag_name }}
          releaseName: Super Terminal ${{ needs.semantic-release.outputs.new_release_version }}
          args: ${{ matrix.args }}

  build-server:
    name: server-${{ matrix.artifact }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: mac-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.semantic-release.outputs.tag_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build UI
        run: |
          npm install --legacy-peer-deps
          npm run build
      - name: Set Cargo version (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          sed -i.bak 's/^version = ".*" # x-release-please-version/version = "'"$VERSION"'" # x-release-please-version/' crates/super-terminal/Cargo.toml
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Set Cargo version (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          (Get-Content crates/super-terminal/Cargo.toml) -replace '^version = ".*" # x-release-please-version', "version = `"$env:VERSION`" # x-release-please-version" | Set-Content crates/super-terminal/Cargo.toml
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Build server binary
        run: cargo build --release --target ${{ matrix.target }} -p super-terminal
      - name: Package binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p dist-server
          cp target/${{ matrix.target }}/release/super-terminal dist-server/
          cd dist-server && tar czf ../super-terminal-server-${{ matrix.target }}.tar.gz super-terminal
      - name: Package binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-server
          Copy-Item "target/${{ matrix.target }}/release/super-terminal.exe" "dist-server/"
          Compress-Archive -Path "dist-server/super-terminal.exe" -DestinationPath "super-terminal-server-${{ matrix.target }}.zip"
      - name: Upload server binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.semantic-release.outputs.tag_name }} super-terminal-server-* --clobber

  update-homebrew:
    name: update-homebrew
    needs: [semantic-release, build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Download macOS arm64 binary from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.semantic-release.outputs.tag_name }} \
            --repo bugwheels94/super-terminal \
            --pattern "super-terminal-server-aarch64-apple-darwin.tar.gz" \
            --dir .
      - name: Download Linux binary from release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.semantic-release.outputs.tag_name }} \
            --repo bugwheels94/super-terminal \
            --pattern "super-terminal-server-x86_64-unknown-linux-gnu.tar.gz" \
            --dir .
      - name: Generate formula
        run: |
          MAC_ARM64_SHA=$(shasum -a 256 super-terminal-server-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          LINUX_SHA=$(shasum -a 256 super-terminal-server-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          VERSION=${{ needs.semantic-release.outputs.new_release_version }}

          cat > super-terminal.rb << 'FORMULA'
          class SuperTerminal < Formula
            desc "Terminal management server with PTY support, WebSocket protocol, and SQLite persistence"
            homepage "https://github.com/bugwheels94/super-terminal"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/bugwheels94/super-terminal/releases/download/vVERSION_PLACEHOLDER/super-terminal-server-aarch64-apple-darwin.tar.gz"
                sha256 "MAC_ARM64_SHA_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/bugwheels94/super-terminal/releases/download/vVERSION_PLACEHOLDER/super-terminal-server-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "LINUX_SHA_PLACEHOLDER"
              end
            end

            def install
              bin.install "super-terminal"
            end

            test do
              assert_match "super-terminal", shell_output("#{bin}/super-terminal --help")
            end
          end
          FORMULA

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" super-terminal.rb
          sed -i "s/MAC_ARM64_SHA_PLACEHOLDER/$MAC_ARM64_SHA/g" super-terminal.rb
          sed -i "s/LINUX_SHA_PLACEHOLDER/$LINUX_SHA/g" super-terminal.rb
      - name: Push formula to tap
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT_TOKEN}@github.com/bugwheels94/homebrew-super-terminal.git tap
          mkdir -p tap/Formula
          cp super-terminal.rb tap/Formula/super-terminal.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/super-terminal.rb
          git commit -m "Update super-terminal to ${{ needs.semantic-release.outputs.new_release_version }}"
          git push
