name: Release
on:
  push:
    branches:
      - master
      - next
      - alpha
      - next-major
      - beta
      - '*.x'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  semantic-release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm install -g semantic-release @semantic-release/github @semantic-release/npm @semantic-release/exec
      - name: Run semantic-release
        id: release
        run: semantic-release
        env:
          HUSKY: 0
          NPM_TOKEN: ${{ secrets.SEMANTIC_RELEASE_BOT_NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-tauri:
    name: tauri-${{ matrix.artifact }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            artifact: mac-arm64
          - platform: ubuntu-latest
            rust-targets: ''
            args: ''
            artifact: ubuntu
          - platform: windows-latest
            rust-targets: ''
            args: ''
            artifact: windows
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.semantic-release.outputs.tag_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - run: npm install --legacy-peer-deps
      - name: Set version (Unix)
        if: matrix.platform != 'windows-latest'
        run: npm --no-git-tag-version version $VERSION
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Set version (Windows)
        if: matrix.platform == 'windows-latest'
        run: npm --no-git-tag-version version $env:VERSION
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.semantic-release.outputs.tag_name }}
          releaseName: Super Terminal ${{ needs.semantic-release.outputs.new_release_version }}
          args: ${{ matrix.args }}

  build-headless:
    name: headless-${{ matrix.artifact }}
    needs: semantic-release
    if: needs.semantic-release.outputs.new_release_published == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: mac-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows-x64
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.semantic-release.outputs.tag_name }}
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build UI
        run: |
          npm install --legacy-peer-deps
          npm run build
      - name: Set Cargo version (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          sed -i.bak 's/^version = ".*" # x-release-please-version/version = "'"$VERSION"'" # x-release-please-version/' crates/super-terminal/Cargo.toml
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Set Cargo version (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          (Get-Content crates/super-terminal/Cargo.toml) -replace '^version = ".*" # x-release-please-version', "version = `"$env:VERSION`" # x-release-please-version" | Set-Content crates/super-terminal/Cargo.toml
        env:
          VERSION: ${{ needs.semantic-release.outputs.new_release_version }}
      - name: Build headless binary
        run: cargo build --release --target ${{ matrix.target }} -p super-terminal
      - name: Package binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p dist-headless
          cp target/${{ matrix.target }}/release/super-terminal dist-headless/super-terminal-headless
          cd dist-headless && tar czf ../super-terminal-headless-${{ matrix.target }}.tar.gz super-terminal-headless
      - name: Package binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-headless
          Copy-Item "target/${{ matrix.target }}/release/super-terminal.exe" "dist-headless/super-terminal-headless.exe"
          Compress-Archive -Path "dist-headless/super-terminal-headless.exe" -DestinationPath "super-terminal-headless-${{ matrix.target }}.zip"
      - name: Upload headless binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.semantic-release.outputs.tag_name }} super-terminal-headless-* --clobber

  update-homebrew:
    name: update-homebrew
    needs: [semantic-release, build-tauri, build-headless]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ needs.semantic-release.outputs.tag_name }} \
            --repo bugwheels94/super-terminal \
            --pattern "super-terminal-headless-*.tar.gz" \
            --pattern "*.dmg" \
            --dir assets
      - name: Generate formulae and cask
        run: |
          VERSION=${{ needs.semantic-release.outputs.new_release_version }}
          TAG=${{ needs.semantic-release.outputs.tag_name }}

          HEADLESS_MAC_ARM64_SHA=$(shasum -a 256 assets/super-terminal-headless-aarch64-apple-darwin.tar.gz | awk '{print $1}')
          HEADLESS_LINUX_SHA=$(shasum -a 256 assets/super-terminal-headless-x86_64-unknown-linux-musl.tar.gz | awk '{print $1}')

          DMG_FILE=$(ls assets/*.dmg | head -1)
          DMG_SHA=$(shasum -a 256 "$DMG_FILE" | awk '{print $1}')
          DMG_NAME=$(basename "$DMG_FILE")

          mkdir -p output/Formula output/Casks

          cat > output/Formula/super-terminal-headless.rb << EOF
          class SuperTerminalHeadless < Formula
            desc "Headless terminal management server with PTY, WebSocket, and SQLite"
            homepage "https://github.com/bugwheels94/super-terminal"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/bugwheels94/super-terminal/releases/download/${TAG}/super-terminal-headless-aarch64-apple-darwin.tar.gz"
                sha256 "${HEADLESS_MAC_ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/bugwheels94/super-terminal/releases/download/${TAG}/super-terminal-headless-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${HEADLESS_LINUX_SHA}"
              end
            end

            def install
              bin.install "super-terminal-headless"
            end

            service do
              run [opt_bin/"super-terminal-headless"]
              keep_alive true
              working_dir var
              log_path var/"log/super-terminal-headless.log"
              error_log_path var/"log/super-terminal-headless.log"
            end

            test do
              assert_match "super-terminal", shell_output("#{bin}/super-terminal-headless --help")
            end
          end
          EOF

          cat > output/Casks/super-terminal.rb << EOF
          cask "super-terminal" do
            version "${VERSION}"
            sha256 "${DMG_SHA}"

            url "https://github.com/bugwheels94/super-terminal/releases/download/${TAG}/${DMG_NAME}"
            name "Super Terminal"
            desc "Terminal management desktop app"
            homepage "https://github.com/bugwheels94/super-terminal"

            app "Super Terminal.app"
          end
          EOF
      - name: Push to tap
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://x-access-token:${PAT_TOKEN}@github.com/bugwheels94/homebrew-super-terminal.git tap
          mkdir -p tap/Formula tap/Casks
          cp output/Formula/super-terminal-headless.rb tap/Formula/super-terminal-headless.rb
          cp output/Casks/super-terminal.rb tap/Casks/super-terminal.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ Casks/
          git commit -m "Update to ${{ needs.semantic-release.outputs.new_release_version }}"
          git push
